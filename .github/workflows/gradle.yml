name: Java CI with Gradle & Docker Deploy

on:
  push:
    branches:
      - devlop
  pull_request:
    branches:
      - devlop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. Cache Gradle packages
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Build with Gradle (skip tests)
      - name: Build with Gradle
        working-directory: server
        run: |
          gradle wrapper
          chmod +x ./gradlew
          ./gradlew clean build -x test

      # 5. Decode application.yml
      - name: Create application.yml
        run: |
          mkdir -p server/src/main/resources
          echo "${{ secrets.APPLICATION_YML }}" | base64 --decode > server/src/main/resources/application.yml
          chmod 644 server/src/main/resources/application.yml

      # 6. Set JAR_FILE environment variable
      - name: Set JAR_FILE env
        run: |
          JAR_FILE=$(ls server/build/libs/*.jar | head -n1)
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV

      # 7. Generate Dockerfile
      - name: Generate Dockerfile
        run: |
          tee Dockerfile << 'EOF'
          FROM openjdk:17-jdk
          ARG JAR_FILE=${{ env.JAR_FILE }}
          COPY server/src/main/resources/application.yml application.yml
          ENV SPRING_CONFIG_LOCATION=application.yml
          COPY ${JAR_FILE} app.jar
          EXPOSE 8080
          ENTRYPOINT ["java", "-jar", "/app.jar"]
          EOF

      # 8. Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/gamzadev --platform linux/amd64 .

      # 9. Docker Hub login
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 10. Push image to Docker Hub
      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/gamzadev

      # 11. Deploy to EC2
      - name: Deploy to EC2
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/gamzadev
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > deploy_key.pem
          chmod 600 deploy_key.pem
          ssh -i deploy_key.pem -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
          # 1) Pull latest image
          sudo docker pull $IMAGE
          
          # 2) Stop and remove existing container
          OLD_CID=$(sudo docker ps -q --filter "name=gamzadev$")
          if [ -n "$OLD_CID" ]; then
            sudo docker stop "$OLD_CID"
            sudo docker rm   "$OLD_CID"
          fi
          
          # 3) Run new container
          sudo docker run -d --name gamzadev -p 8080:8080 $IMAGE
          
          # 4) Cleanup unused images
          sudo docker image prune -f
          EOF
